services:
  frontend:
    build:
      context: .
      dockerfile: ./src/app/Dockerfile
      args:
        NEXT_PUBLIC_EMAIL_DOMAIN_CHECK: ${NEXT_PUBLIC_EMAIL_DOMAIN_CHECK}
        NEXT_PUBLIC_SERVER_PUBLIC_KEY: ${NEXT_PUBLIC_SERVER_PUBLIC_KEY}
        NEXT_PUBLIC_CERTIFIER_URL: ${NEXT_PUBLIC_CERTIFIER_URL}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./server/Dockerfile
      args:
        NEXT_PUBLIC_EMAIL_DOMAIN_CHECK: ${NEXT_PUBLIC_EMAIL_DOMAIN_CHECK}
        NEXT_PUBLIC_SERVER_PUBLIC_KEY: ${NEXT_PUBLIC_SERVER_PUBLIC_KEY}
        NEXT_PUBLIC_CERTIFIER_URL: ${NEXT_PUBLIC_CERTIFIER_URL}
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
